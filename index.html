<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#08081a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TechStack" />
    <link rel="manifest" href="/pericore-techstack/manifest.json" />
    <link rel="apple-touch-icon" href="/pericore-techstack/icon-192.png" />
    <title>PERICORE TechStack</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #08081a; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/pericore-techstack/sw.js');
        });
      }
    </script>
  </body>
</html>
